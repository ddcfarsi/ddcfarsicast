<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DDCFarsi Podcast - Mindful PRO Edition</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/RecordRTC/5.6.2/RecordRTC.min.js"></script>
    
    <style>
        @import url('https://v1.fontapi.ir/css/Vazir');
        
        * { box-sizing: border-box; font-family: 'Vazir', sans-serif; margin: 0; padding: 0; }
        body { background: #0f172a; color: #f8fafc; display: flex; flex-direction: column; align-items: center; padding-bottom: 30px; }

        h2.app-title { margin-top: 15px; margin-bottom: 10px; color: #38bdf8; font-weight: bold; font-size: 24px; text-shadow: 0 0 15px rgba(56, 189, 248, 0.4); text-align: center;}

        #studio-wrapper {
            width: 100%; max-width: 400px; aspect-ratio: 9/16; background: #0b1120; position: relative;
            border-radius: 20px; overflow: hidden; box-shadow: 0 15px 35px rgba(0,0,0,0.6); border: 1px solid #1e293b;
        }

        #raw-video { display: none; }
        #render-canvas { width: 100%; height: 100%; display: block; }

        /* ---------- تله‌پرامپتر مخفی (متن‌خوان) ---------- */
        #teleprompter {
            position: absolute; top: 5%; left: 5%; width: 90%; height: 75%;
            background: rgba(15, 23, 42, 0.65); backdrop-filter: blur(4px);
            border: 2px solid #8b5cf6; border-radius: 15px; display: none; 
            flex-direction: column; z-index: 100; overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }
        #tp-text {
            flex: 1; background: transparent; color: #e2e8f0; font-size: 26px; font-weight: bold;
            border: none; padding: 20px; resize: none; text-align: center; line-height: 2; outline: none;
        }
        #tp-controls {
            display: flex; justify-content: space-between; align-items: center;
            background: #1e293b; padding: 10px; border-top: 2px solid #8b5cf6;
        }
        .tp-btn { background: #38bdf8; color: #0f172a; border: none; padding: 8px 12px; border-radius: 5px; font-weight: bold; cursor: pointer; width: auto; margin:0;}

        /* ---------- پنل تنظیمات ---------- */
        #controls { width: 100%; max-width: 400px; padding: 15px; margin-top: 10px; }
        .control-group { margin-bottom: 15px; background: #1e293b; padding: 15px; border-radius: 12px; border-right: 4px solid #8b5cf6;}
        label { display: block; margin-bottom: 8px; font-size: 13px; color: #cbd5e1; font-weight: bold; }
        input[type="text"], select {
            width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #334155;
            background: #0f172a; color: white; margin-bottom: 10px; font-size: 14px; transition: 0.3s;
        }
        input[type="text"]:focus, select:focus { border-color: #38bdf8; outline: none; box-shadow: 0 0 5px rgba(56,189,248,0.3); }
        input[type="file"] { margin-bottom: 10px; font-size: 12px; width: 100%; color: #94a3b8; }
        
        button {
            background: #38bdf8; color: #0f172a; border: none; padding: 12px 15px;
            border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; margin-bottom: 10px; font-size: 14px; transition: 0.2s;
        }
        button:hover { filter: brightness(1.1); transform: translateY(-1px); }
        
        button.record-btn { background: #f43f5e; color: white; animation: pulse 2.5s infinite; font-size: 16px; padding: 15px;}
        button.stop-btn { background: #334155; color: white; display: none; font-size: 16px; padding: 15px;}
        button.download-btn { background: #10b981; color: white; display: none; font-size: 16px; padding: 15px;}
        
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(244, 63, 94, 0.6); }
            70% { box-shadow: 0 0 0 12px rgba(244, 63, 94, 0); }
            100% { box-shadow: 0 0 0 0 rgba(244, 63, 94, 0); }
        }

        .flex-row { display: flex; gap: 10px; align-items: center; margin-bottom: 10px;}
        .flex-row button, .flex-row select { flex: 1; margin-bottom: 0;}
        .social-inputs { display: flex; flex-direction: column; gap: 8px; margin-bottom: 10px; }
        .social-inputs div { display: flex; align-items: center; gap: 10px; }
        .social-inputs i { width: 25px; text-align: center; font-size: 18px; }

        .checkbox-label { display: flex; align-items: center; gap: 8px; font-size: 14px; cursor: pointer; margin-top: 10px; color: #e2e8f0; font-weight: normal; }
        .checkbox-label input { width: 18px; height: 18px; cursor: pointer; accent-color: #8b5cf6; }

        .footer-link { text-align: center; margin-top: 10px; font-size: 14px; }
        .footer-link a { color: #8b5cf6; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

    <h2 class="app-title">DDCFarsi Podcast<br><span style="font-size: 14px; color: #94a3b8; font-weight: normal;">Mindful Edition</span></h2>

    <div id="studio-wrapper">
        <video id="raw-video" autoplay muted playsinline></video>
        <canvas id="render-canvas" width="720" height="1280"></canvas>
        
        <!-- تله‌پرامپتر مخفی (فقط شما میبینید، ضبط نمیشود) -->
        <div id="teleprompter">
            <textarea id="tp-text" placeholder="متن پادکست خود را اینجا پیست کنید..."></textarea>
            <div id="tp-controls">
                <button class="tp-btn" onclick="changeTpSpeed(-0.5)" style="background:#475569; color:white;">🐌 کند</button>
                <button class="tp-btn" id="tp-play-btn" onclick="toggleTpPlay()" style="background:#10b981; color:white;">▶ پخش</button>
                <button class="tp-btn" onclick="changeTpSpeed(0.5)" style="background:#475569; color:white;">🐇 تند</button>
                <button class="tp-btn" onclick="toggleTeleprompter()" style="background:#f43f5e; color:white;">✖ بستن</button>
            </div>
        </div>
    </div>

    <div id="controls">
        
        <div class="control-group" id="record-controls" style="display: none;">
            <button id="btn-record" class="record-btn" onclick="startRecording()">🔴 شروع ضبط آرامش‌بخش</button>
            <button id="btn-stop" class="stop-btn" onclick="stopRecording()">⬛ پایان ضبط</button>
            <button id="btn-download" class="download-btn" onclick="downloadVideo()">⬇️ دانلود ویدیو خروجی</button>
        </div>

        <div class="control-group">
            <label>📷 و 🎙️ دستگاه‌های ورودی</label>
            <select id="video-source" onchange="startCamera()"></select>
            <select id="audio-source" onchange="startCamera()"></select>
            
            <div class="flex-row">
                <button onclick="startCamera(false)" style="background: #eab308; color: #0f172a;">فعال‌سازی / ریفرش</button>
                <button onclick="flipCamera()" style="background: #334155; color: white;">🔄 چرخش دوربین</button>
            </div>
            
            <label class="checkbox-label">
                <input type="checkbox" id="mirror-camera" onchange="toggleMirror()">
                آینه‌ای کردن تصویر دوربین (چپ و راست)
            </label>
            
            <button id="btn-audio-mode" onclick="toggleAudioMode()" style="background: #8b5cf6; color: white; margin-top: 15px;">🎙️ تغییر به حالت پادکست درمانی</button>
            <select id="eq-style" style="display: none; margin-top: 10px; background: #4c1d95; border: 1px solid #7c3aed;">
                <option value="aura">✨ مود ۱: تنفس ذهن (هاله انرژی)</option>
                <option value="eeg">〰️ مود ۲: امواج مغزی (خطی نرم)</option>
                <option value="neurons">🧠 مود ۳: پالس‌های عصبی (نقطه‌ای)</option>
                <option value="reflection">🪞 مود ۴: انعکاس درون (متقارن نرم)</option>
            </select>
        </div>

        <div class="control-group">
            <label>🖼️ تصویر و ابزارهای حرفه‌ای</label>
            
            <div class="flex-row">
                <button onclick="toggleCameraVisibility()" style="background: #f43f5e; color: white;">👁️ مخفی/نمایش دوربین</button>
                <button onclick="toggleTeleprompter()" style="background: #8b5cf6; color: white;">📜 تله‌پرامپتر (متن‌خوان)</button>
            </div>

            <label style="font-size: 12px; color: #94a3b8; margin-top:10px;">لوگوی پادکست:</label>
            <input type="file" id="logo-upload" accept="image/*">
            
            <label style="font-size: 12px; color: #94a3b8; margin-top: 10px;">پس‌زمینه آرامش‌بخش:</label>
            <input type="file" id="media-upload" accept="image/*,video/*">
            
            <label style="font-size: 12px; color: #94a3b8; margin-top: 10px;">تنظیمات کادر تصویر-در-تصویر:</label>
            <div class="flex-row">
                <select id="pip-shape" style="background: #334155;">
                    <option value="rect">مستطیل گوشه‌گرد</option>
                    <option value="circle">دایره‌ای (حرفه‌ای)</option>
                </select>
                <button onclick="toggleCameraPiP()" style="background: #475569; color: white;">نمایش کادر</button>
            </div>
            
            <button id="btn-bg-audio" onclick="toggleBgAudio()" style="background: #f43f5e; color: white; display: none; margin-top: 10px;">🔇 صدای پس‌زمینه: قطع</button>
        </div>

        <div class="control-group">
            <label>📱 مسیرهای ارتباطی</label>
            <div class="social-inputs">
                <div><i class="fab fa-instagram" style="color: #ec4899;"></i> <input type="text" id="soc-ig" placeholder="Instagram ID" value="@MindfulPodcast"></div>
                <div><i class="fab fa-tiktok" style="color: #e2e8f0;"></i> <input type="text" id="soc-tt" placeholder="TikTok ID" value="@Mindful_TK"></div>
                <div><i class="fab fa-facebook" style="color: #3b82f6;"></i> <input type="text" id="soc-fb" placeholder="Facebook Page"></div>
                <div><i class="fab fa-telegram" style="color: #0ea5e9;"></i> <input type="text" id="soc-tg" placeholder="Telegram ID"></div>
                <div><i class="fab fa-youtube" style="color: #ef4444;"></i> <input type="text" id="soc-yt" placeholder="YouTube Channel"></div>
            </div>
        </div>

        <div class="control-group">
            <label>✍️ گفتار و اندیشه (کادرهای هوشمند)</label>
            <input type="text" id="input-title" placeholder="موضوع اصلی..." value="پادکست مسیر آرامش">
            <input type="text" id="input-speaker" placeholder="روانشناس / میزبان..." value="نام روانشناس">
            <input type="text" id="input-topic" placeholder="موضوع بحث..." value="مدیریت افکار در دنیای مدرن">
            <input type="text" id="input-ticker" placeholder="پیام پایین صفحه..." value="به پادکست روانشناسی ما خوش آمدید. نفس عمیق بکشید و با ما همراه شوید...">
        </div>
    </div>

    <div class="footer-link">
        <a href="https://www.youtube.com/ddcfarsi" target="_blank">www.youtube.com/ddcfarsi</a>
    </div>

    <script>
        const videoEl = document.getElementById('raw-video');
        const canvas = document.getElementById('render-canvas');
        const ctx = canvas.getContext('2d', { alpha: false }); 
        
        ctx.imageSmoothingEnabled = true;
        ctx.imageSmoothingQuality = 'high';
        
        let logoImg = new Image();
        let currentStream = null;
        
        let customBgImg = new Image();
        let customBgVideo = document.createElement('video');
        customBgVideo.muted = true; 
        customBgVideo.loop = true; 
        customBgVideo.playsInline = true;
        let bgMediaType = null;
        
        let isCameraPiP = false; 
        let isCameraVisible = true;
        let isCameraMirrored = false; 
        let currentFacingMode = "user";

        let rtcRecorder = null;
        let recordedBlob = null;
        let isRecording = false;

        let isAudioMode = false;
        let audioContext = null;
        let analyser = null;
        let dataArray = null;
        let timeDomainArray = null;

        // متغیرهای تله پرامپتر
        let tpInterval = null;
        let tpSpeed = 1.5;
        let isTpPlaying = false;

        ctx.textBaseline = "middle";

        async function getDevices() {
            try {
                await navigator.mediaDevices.getUserMedia({ audio: true, video: true });
                const devices = await navigator.mediaDevices.enumerateDevices();
                
                const videoSelect = document.getElementById('video-source');
                const audioSelect = document.getElementById('audio-source');
                
                const currentVideo = videoSelect.value;
                const currentAudio = audioSelect.value;

                videoSelect.innerHTML = ''; 
                audioSelect.innerHTML = '';

                devices.forEach(device => {
                    const option = document.createElement('option');
                    option.value = device.deviceId;
                    if (device.kind === 'videoinput') {
                        option.text = device.label || `دوربین ${videoSelect.length + 1}`;
                        videoSelect.appendChild(option);
                    } else if (device.kind === 'audioinput') {
                        option.text = device.label || `میکروفون ${audioSelect.length + 1}`;
                        audioSelect.appendChild(option);
                    }
                });

                if (currentVideo) videoSelect.value = currentVideo;
                if (currentAudio) audioSelect.value = currentAudio;

            } catch (err) { console.error("Device Error:", err); }
        }
        
        getDevices();
        navigator.mediaDevices.ondevicechange = getDevices;

        async function startCamera(useFacingMode = false) {
            if (currentStream) {
                currentStream.getTracks().forEach(t => t.stop());
            }
            
            const vSource = document.getElementById('video-source').value;
            const aSource = document.getElementById('audio-source').value;
            
            let videoConstraints = { width: { ideal: 720 }, height: { ideal: 1280 } };
            
            if (useFacingMode) {
                videoConstraints.facingMode = currentFacingMode;
            } else if (vSource) {
                videoConstraints.deviceId = { exact: vSource };
            }

            let audioConstraints = { 
                echoCancellation: true, noiseSuppression: true,
                autoGainControl: true, sampleRate: 48000, channelCount: 2
            };
            if (aSource) audioConstraints.deviceId = { exact: aSource };
            
            try {
                currentStream = await navigator.mediaDevices.getUserMedia({ video: videoConstraints, audio: audioConstraints });
                videoEl.srcObject = currentStream;
                await videoEl.play();

                setupAudioEqualizer();
                document.getElementById('record-controls').style.display = 'block';
                requestAnimationFrame(renderCanvas);
            } catch (error) { 
                console.error("Camera Error:", error);
            }
        }

        function flipCamera() {
            currentFacingMode = currentFacingMode === "user" ? "environment" : "user";
            startCamera(true);
        }

        function toggleCameraVisibility() { isCameraVisible = !isCameraVisible; }
        function toggleMirror() { isCameraMirrored = document.getElementById('mirror-camera').checked; }

        function toggleBgAudio() {
            const btn = document.getElementById('btn-bg-audio');
            customBgVideo.muted = !customBgVideo.muted;
            if (customBgVideo.muted) {
                btn.innerHTML = "🔇 صدای پس‌زمینه: قطع"; btn.style.background = "#f43f5e"; 
            } else {
                btn.innerHTML = "🔊 صدای پس‌زمینه: وصل"; btn.style.background = "#10b981"; 
            }
        }

        function toggleAudioMode() {
            isAudioMode = !isAudioMode;
            const btn = document.getElementById('btn-audio-mode');
            const eqSelect = document.getElementById('eq-style');
            if (isAudioMode) {
                btn.innerHTML = "🎥 بازگشت به حالت ویدیویی"; btn.style.background = "#f43f5e";
                eqSelect.style.display = "block";
                if (audioContext && audioContext.state === 'suspended') audioContext.resume();
            } else {
                btn.innerHTML = "🎙️ تغییر به حالت پادکست درمانی"; btn.style.background = "#8b5cf6";
                eqSelect.style.display = "none";
            }
        }

        function setupAudioEqualizer() {
            if (!currentStream || currentStream.getAudioTracks().length === 0) return;
            try {
                if (!audioContext) {
                    audioContext = new (window.AudioContext || window.webkitAudioContext)();
                    analyser = audioContext.createAnalyser();
                    analyser.fftSize = 128; 
                    const source = audioContext.createMediaStreamSource(currentStream);
                    source.connect(analyser);
                    dataArray = new Uint8Array(analyser.frequencyBinCount);
                    timeDomainArray = new Uint8Array(analyser.fftSize);
                }
                if (audioContext.state === 'suspended') audioContext.resume();
            } catch (e) { console.error("Audio Context Error:", e); }
        }

        // توابع تله پرامپتر
        function toggleTeleprompter() {
            const tp = document.getElementById('teleprompter');
            tp.style.display = tp.style.display === 'flex' ? 'none' : 'flex';
            if (tp.style.display === 'none') {
                clearInterval(tpInterval);
                isTpPlaying = false;
                document.getElementById('tp-play-btn').innerHTML = "▶ پخش";
            }
        }
        function toggleTpPlay() {
            const btn = document.getElementById('tp-play-btn');
            const ta = document.getElementById('tp-text');
            isTpPlaying = !isTpPlaying;
            if (isTpPlaying) {
                btn.innerHTML = "⏸ توقف"; btn.style.background = "#f43f5e";
                tpInterval = setInterval(() => { ta.scrollTop += tpSpeed; }, 50);
            } else {
                btn.innerHTML = "▶ پخش"; btn.style.background = "#10b981";
                clearInterval(tpInterval);
            }
        }
        function changeTpSpeed(amount) {
            tpSpeed += amount;
            if (tpSpeed < 0.5) tpSpeed = 0.5;
        }

        document.getElementById('logo-upload').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) logoImg.src = URL.createObjectURL(file);
        });

        document.getElementById('media-upload').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const url = URL.createObjectURL(file);
            const btnBgAudio = document.getElementById('btn-bg-audio');
            if (file.type.startsWith('video/')) {
                bgMediaType = 'video'; customBgVideo.src = url; customBgVideo.play(); btnBgAudio.style.display = 'block'; 
            } else {
                bgMediaType = 'image'; customBgImg.src = url; btnBgAudio.style.display = 'none'; 
            }
            isCameraPiP = true; 
        });

        function toggleCameraPiP() { isCameraPiP = !isCameraPiP; }

        function drawScaled(media, isMirrored = false) {
            const vW = media.videoWidth || media.width;
            const vH = media.videoHeight || media.height;
            const scale = Math.max(canvas.width / vW, canvas.height / vH);
            const x = (canvas.width / 2) - (vW / 2) * scale;
            const y = (canvas.height / 2) - (vH / 2) * scale;
            
            if (isMirrored) {
                ctx.save();
                ctx.scale(-1, 1);
                ctx.drawImage(media, -x - (vW * scale), y, vW * scale, vH * scale);
                ctx.restore();
            } else {
                ctx.drawImage(media, x, y, vW * scale, vH * scale);
            }
        }

        // تابع برش هوشمند برای دوربین در کادر (چه مستطیل چه دایره)
        function drawCoverInShape(media, x, y, w, h, isMirrored) {
            const vW = media.videoWidth || media.width;
            const vH = media.videoHeight || media.height;
            const scale = Math.max(w / vW, h / vH);
            const drawW = vW * scale;
            const drawH = vH * scale;
            const drawX = x + (w - drawW) / 2;
            const drawY = y + (h - drawH) / 2;

            if (isMirrored) {
                ctx.save();
                ctx.scale(-1, 1);
                ctx.drawImage(media, -drawX - drawW, drawY, drawW, drawH);
                ctx.restore();
            } else {
                ctx.drawImage(media, drawX, drawY, drawW, drawH);
            }
        }

        let tickerX = -2000; 
        let textMotionState = 'WAITING'; 
        let textMotionTimer = 0;
        let textMotionProgress = 0;

        function easeOutCubic(t) { return 1 - Math.pow(1 - t, 3); }

        function renderCanvas() {
            ctx.fillStyle = "#0b1120"; 
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            if (bgMediaType === 'video' && customBgVideo.readyState >= 2) {
                drawScaled(customBgVideo);
            } else if (bgMediaType === 'image' && customBgImg.src) {
                drawScaled(customBgImg);
            }

            let audioVolume = 0;
            if (analyser && dataArray) {
                analyser.getByteFrequencyData(dataArray);
                let sum = 0;
                for(let i = 0; i < dataArray.length; i++) { sum += dataArray[i]; }
                audioVolume = sum / dataArray.length;
            }

            // رسم اکولایزر
            if (isAudioMode) {
                if (analyser && dataArray && timeDomainArray) {
                    const eqType = document.getElementById('eq-style').value;
                    const bufferLength = analyser.frequencyBinCount; 
                    const centerY = canvas.height / 2;
                    const centerX = canvas.width / 2;
                    
                    let gradient = ctx.createLinearGradient(0, centerY - 200, 0, centerY + 200);
                    gradient.addColorStop(0, "#2dd4bf");
                    gradient.addColorStop(0.5, "#38bdf8");
                    gradient.addColorStop(1, "#8b5cf6");

                    ctx.strokeStyle = gradient;
                    ctx.fillStyle = gradient;

                    if (eqType === 'aura') {
                        ctx.save();
                        let radius1 = 100 + (audioVolume * 1.5);
                        let radius2 = 120 + (audioVolume * 2.5);
                        let radius3 = 140 + (audioVolume * 3.5);
                        ctx.globalAlpha = 0.15; ctx.beginPath(); ctx.arc(centerX, centerY, radius3, 0, Math.PI * 2); ctx.fill();
                        ctx.globalAlpha = 0.3; ctx.beginPath(); ctx.arc(centerX, centerY, radius2, 0, Math.PI * 2); ctx.fill();
                        ctx.globalAlpha = 0.6; ctx.beginPath(); ctx.arc(centerX, centerY, radius1, 0, Math.PI * 2); ctx.fill();
                        ctx.restore();
                    } else if (eqType === 'eeg') {
                        analyser.getByteTimeDomainData(timeDomainArray);
                        ctx.lineWidth = 6; ctx.shadowBlur = 15; ctx.shadowColor = "#38bdf8";
                        ctx.beginPath();
                        let sliceWidth = canvas.width * 1.0 / timeDomainArray.length;
                        let x = 0;
                        for(let i = 0; i < timeDomainArray.length; i++) {
                            let v = timeDomainArray[i] / 128.0; 
                            let y = (v * 150) + (centerY - 150); 
                            if(i === 0) { ctx.moveTo(x, y); } else {
                                let prevV = timeDomainArray[i-1] / 128.0;
                                let prevY = (prevV * 150) + (centerY - 150);
                                let xc = (x + (x - sliceWidth)) / 2;
                                let yc = (y + prevY) / 2;
                                ctx.quadraticCurveTo(x - sliceWidth, prevY, xc, yc);
                            }
                            x += sliceWidth;
                        }
                        ctx.lineTo(canvas.width, centerY); ctx.stroke(); ctx.shadowBlur = 0;
                    } else if (eqType === 'neurons') {
                        const radius = 140;
                        for(let i = 0; i < bufferLength; i += 2) { 
                            let intensity = dataArray[i] / 255; 
                            let angle = (i * 2 * Math.PI) / bufferLength;
                            let xPos = centerX + Math.cos(angle) * radius;
                            let yPos = centerY + Math.sin(angle) * radius;
                            let dotSize = 3 + (intensity * 12);
                            ctx.globalAlpha = 0.3 + (intensity * 0.7);
                            ctx.beginPath(); ctx.arc(xPos, yPos, dotSize, 0, Math.PI * 2); ctx.fill();
                            ctx.globalAlpha = 1.0;
                        }
                    } else if (eqType === 'reflection') {
                        const barWidth = (canvas.width / bufferLength) * 1.2;
                        let x = (canvas.width - (bufferLength * barWidth)) / 2;
                        ctx.lineCap = 'round'; ctx.shadowBlur = 10; ctx.shadowColor = "#8b5cf6";
                        for(let i = 0; i < bufferLength; i++) {
                            let barHeight = (dataArray[i] / 255) * 150;
                            if (barHeight < 2) barHeight = 2; 
                            ctx.beginPath(); ctx.roundRect(x, centerY - barHeight, barWidth - 4, barHeight, 10); ctx.fill();
                            ctx.globalAlpha = 0.5; 
                            ctx.beginPath(); ctx.roundRect(x, centerY, barWidth - 4, barHeight, 10); ctx.fill();
                            ctx.globalAlpha = 1.0;
                            x += barWidth;
                        }
                        ctx.shadowBlur = 0;
                    }
                }
            } else {
                // رسم دوربین
                if (isCameraVisible && videoEl.readyState === videoEl.HAVE_ENOUGH_DATA) {
                    if (isCameraPiP) {
                        const pipShape = document.getElementById('pip-shape').value;
                        const pipW = 220;
                        // اگر دایره بود ارتفاع برابر عرض میشود تا گرد کامل شود
                        const pipH = pipShape === 'circle' ? 220 : 290;
                        const pipX = canvas.width - pipW - 30; 
                        const pipY = 110; 
                        
                        ctx.save();
                        ctx.beginPath();
                        if (pipShape === 'circle') {
                            ctx.arc(pipX + pipW/2, pipY + pipH/2, pipW/2, 0, Math.PI * 2);
                        } else {
                            ctx.roundRect(pipX, pipY, pipW, pipH, 15);
                        }
                        ctx.clip();
                        
                        // استفاده از تابع هوشمند برای پر کردن کادر بدون فشردگی تصویر
                        drawCoverInShape(videoEl, pipX, pipY, pipW, pipH, isCameraMirrored);
                        
                        ctx.restore();
                        
                        // رسم حاشیه
                        ctx.beginPath();
                        if (pipShape === 'circle') {
                            ctx.arc(pipX + pipW/2, pipY + pipH/2, pipW/2, 0, Math.PI * 2);
                        } else {
                            ctx.roundRect(pipX, pipY, pipW, pipH, 15);
                        }
                        ctx.lineWidth = 4;
                        ctx.strokeStyle = "rgba(255,255,255,0.8)";
                        ctx.stroke();
                    } else {
                        drawScaled(videoEl, isCameraMirrored);
                    }
                }
            }

            // لوگوی درمانی
            if (logoImg.src) {
                ctx.save();
                const time = Date.now() / 1000;
                const floatY = Math.sin(time * 1.5) * 8; 
                ctx.translate(90, 90 + floatY);
                
                if (audioVolume > 5) {
                    const glowIntensity = (audioVolume / 255) * 40; 
                    ctx.shadowColor = "#38bdf8"; 
                    ctx.shadowBlur = 15 + glowIntensity;
                    ctx.shadowOffsetX = 0; ctx.shadowOffsetY = 0;
                    ctx.beginPath(); ctx.arc(0, 0, 52 + (glowIntensity/4), 0, Math.PI * 2);
                    ctx.fillStyle = "rgba(56, 189, 248, 0.3)"; ctx.fill();
                }

                ctx.beginPath(); ctx.arc(0, 0, 50, 0, Math.PI * 2); ctx.clip();
                ctx.drawImage(logoImg, -50, -50, 100, 100);
                ctx.restore();
            }

            // عنوان
            const title = document.getElementById('input-title').value;
            if (title) {
                ctx.font = "bold 20px Vazir, Arial";
                const titleWidth = ctx.measureText(title).width + 60; 
                const titleX = canvas.width - titleWidth - 30; 
                ctx.fillStyle = "rgba(15, 23, 42, 0.75)"; 
                ctx.roundRect(titleX, 40, titleWidth, 46, 23); 
                ctx.fill();
                ctx.fillStyle = "#e2e8f0"; 
                ctx.textAlign = "center";
                ctx.fillText(title, titleX + (titleWidth / 2), 63);
            }

            renderSocials();

            // موشن گرافیک گوینده (کادر کشسان)
            const speaker = document.getElementById('input-speaker').value;
            const topic = document.getElementById('input-topic').value;
            if (speaker || topic) {
                ctx.font = "bold 26px Vazir, Arial";
                const speakerW = ctx.measureText(speaker).width;
                ctx.font = "16px Vazir, Arial";
                const topicW = ctx.measureText(topic).width;
                const lowerThirdWidth = Math.max(speakerW, topicW) + 70; 

                textMotionTimer++;
                if (textMotionState === 'WAITING' && textMotionTimer > 600) { textMotionState = 'ENTERING'; textMotionTimer = 0; } 
                else if (textMotionState === 'ENTERING') { textMotionProgress += 0.02; if (textMotionProgress >= 1) { textMotionProgress = 1; textMotionState = 'VISIBLE'; textMotionTimer = 0; } } 
                else if (textMotionState === 'VISIBLE' && textMotionTimer > 420) { textMotionState = 'EXITING'; textMotionTimer = 0; } 
                else if (textMotionState === 'EXITING') { textMotionProgress -= 0.02; if (textMotionProgress <= 0) { textMotionProgress = 0; textMotionState = 'WAITING'; textMotionTimer = 0; } }

                if (textMotionProgress > 0) {
                    const eased = easeOutCubic(textMotionProgress);
                    const startX = -lowerThirdWidth - 50; 
                    const targetX = 30; 
                    const currentX = startX + (targetX - startX) * eased;

                    ctx.save();
                    ctx.globalAlpha = eased; 
                    ctx.fillStyle = "rgba(15, 23, 42, 0.85)"; 
                    ctx.roundRect(currentX, canvas.height - 150, lowerThirdWidth, 80, 16);
                    ctx.fill();
                    ctx.fillStyle = "#8b5cf6"; 
                    ctx.roundRect(currentX + lowerThirdWidth - 12, canvas.height - 150, 12, 80, {tr: 16, br: 16, tl: 0, bl: 0});
                    ctx.fill();
                    ctx.textAlign = "right"; ctx.font = "bold 26px Vazir, Arial"; ctx.fillStyle = "#f8fafc";
                    ctx.fillText(speaker, currentX + lowerThirdWidth - 35, canvas.height - 122);
                    ctx.font = "16px Vazir, Arial"; ctx.fillStyle = "#94a3b8";
                    ctx.fillText(topic, currentX + lowerThirdWidth - 35, canvas.height - 88);
                    ctx.restore();
                }
            }

            // زیرنویس (چپ به راست)
            const tickerText = document.getElementById('input-ticker').value;
            if (tickerText) {
                ctx.fillStyle = "rgba(15, 23, 42, 0.85)";
                ctx.fillRect(0, canvas.height - 50, canvas.width, 50);
                ctx.fillStyle = "#cbd5e1"; 
                ctx.font = "18px Vazir, Arial";
                ctx.textAlign = "left"; 
                
                const textWidth = ctx.measureText(tickerText).width;
                if(tickerX === -2000) tickerX = -textWidth;

                ctx.fillText(tickerText, tickerX, canvas.height - 25);
                tickerX += 1.2; 
                if (tickerX > canvas.width) tickerX = -textWidth;
            }

            requestAnimationFrame(renderCanvas);
        }

        let socialIndex = 0;
        let socialTimer = 0;
        function renderSocials() {
            const ig = document.getElementById('soc-ig').value;
            const tt = document.getElementById('soc-tt').value; 
            const fb = document.getElementById('soc-fb').value; 
            const tg = document.getElementById('soc-tg').value;
            const yt = document.getElementById('soc-yt').value;
            
            let activeSocials = [];
            if(ig) activeSocials.push({ text: ig, color: '#ec4899', icon: '\uf16d' });
            if(tt) activeSocials.push({ text: tt, color: '#e2e8f0', icon: '\ue07b' }); 
            if(fb) activeSocials.push({ text: fb, color: '#3b82f6', icon: '\uf09a' }); 
            if(tg) activeSocials.push({ text: tg, color: '#0ea5e9', icon: '\uf2c6' });
            if(yt) activeSocials.push({ text: yt, color: '#ef4444', icon: '\uf167' });

            if (activeSocials.length === 0) return;

            socialTimer++;
            if (socialTimer > 180) { 
                socialIndex = (socialIndex + 1) % activeSocials.length;
                socialTimer = 0;
            }

            const current = activeSocials[socialIndex];
            
            // داینامیک شدن ارتفاع اگر دوربین روی مستطیل یا دایره بود
            const pipMode = document.getElementById('pip-shape').value;
            const pipH = pipMode === 'circle' ? 220 : 290;
            const boxY = (isCameraPiP && isCameraVisible && !isAudioMode) ? (110 + pipH + 20) : 100;

            ctx.font = "bold 16px Vazir, Arial";
            const socialWidth = ctx.measureText(current.text).width + 65; 
            const socialX = canvas.width - socialWidth - 30;

            ctx.fillStyle = "rgba(15, 23, 42, 0.75)";
            ctx.roundRect(socialX, boxY, socialWidth, 38, 19);
            ctx.fill();

            ctx.fillStyle = current.color;
            ctx.font = '900 20px "Font Awesome 6 Brands"';
            ctx.textAlign = "left";
            ctx.fillText(current.icon, socialX + socialWidth - 35, boxY + 19);
            
            ctx.font = "bold 16px Vazir, Arial";
            ctx.fillStyle = "#f8fafc";
            ctx.textAlign = "right";
            ctx.fillText(current.text, socialX + socialWidth - 45, boxY + 19);
        }

        CanvasRenderingContext2D.prototype.roundRect = function (x, y, w, h, r) {
            if (w < 2 * r) r = w / 2;
            if (h < 2 * r) r = h / 2;
            if (typeof r === 'object') {
                this.beginPath(); this.moveTo(x + r.tl, y); this.arcTo(x + w, y, x + w, y + h, r.tr);
                this.arcTo(x + w, y + h, x + x, y + h, r.br); this.arcTo(x, y + h, x, y, r.bl);
                this.arcTo(x, y, x + w, y, r.tl); this.closePath(); return this;
            }
            this.beginPath(); this.moveTo(x + r, y); this.arcTo(x + w, y, x + w, y + h, r);
            this.arcTo(x + w, y + h, x + x, y + h, r); this.arcTo(x, y + h, x, y, r);
            this.arcTo(x, y, x + w, y, r); this.closePath(); return this;
        }

        function startRecording() {
            if (!currentStream) return alert("ابتدا دستگاه‌ها را فعال کنید.");
            const canvasStream = canvas.captureStream(30); 
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const dest = audioCtx.createMediaStreamDestination();

            const compressor = audioCtx.createDynamicsCompressor();
            compressor.threshold.value = -28; compressor.knee.value = 40; 
            compressor.ratio.value = 6; compressor.attack.value = 0.005; compressor.release.value = 0.3; 
            compressor.connect(dest);

            if (currentStream.getAudioTracks().length > 0) {
                const micSource = audioCtx.createMediaStreamSource(currentStream);
                micSource.connect(compressor);
            }

            if (bgMediaType === 'video' && !customBgVideo.muted) {
                try {
                    const bgStream = customBgVideo.captureStream ? customBgVideo.captureStream() : customBgVideo.mozCaptureStream();
                    if (bgStream && bgStream.getAudioTracks().length > 0) {
                        const bgSource = audioCtx.createMediaStreamSource(bgStream);
                        bgSource.connect(dest);
                    }
                } catch(e) { console.error("Audio mix error:", e); }
            }
            
            const combinedStream = new MediaStream([ ...canvasStream.getVideoTracks(), ...dest.stream.getAudioTracks() ]);
            
            rtcRecorder = RecordRTC(combinedStream, {
                type: 'video', mimeType: 'video/webm;codecs=vp8,opus',
                videoBitsPerSecond: 5000000, audioBitsPerSecond: 128000, frameInterval: 30, disableLogs: false
            });

            rtcRecorder.startRecording();
            isRecording = true;

            document.getElementById('btn-record').style.display = 'none';
            document.getElementById('btn-stop').style.display = 'block';
            document.getElementById('btn-download').style.display = 'none';
        }

        function stopRecording() {
            if (rtcRecorder && isRecording) {
                rtcRecorder.stopRecording(function() {
                    recordedBlob = rtcRecorder.getBlob();
                    isRecording = false;
                    document.getElementById('btn-record').style.display = 'block';
                    document.getElementById('btn-stop').style.display = 'none';
                    document.getElementById('btn-download').style.display = 'block';
                });
            }
        }

        function downloadVideo() {
            if (!recordedBlob) return;
            const url = URL.createObjectURL(recordedBlob);
            const a = document.createElement('a');
            document.body.appendChild(a);
            a.style = 'display: none';
            a.href = url;
            const prefix = isAudioMode ? "MindfulAudio" : "MindfulVideo";
            a.download = `DDCFarsi_${prefix}_${new Date().getTime()}.webm`;
            a.click();
            window.URL.revokeObjectURL(url);
        }
    </script>
